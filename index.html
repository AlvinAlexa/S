<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    /* Remove all Blogger selectors – they do nothing on GitHub */
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      background: #000 !important;
    }
    #s803-embed-wrap {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 999999 !important;
      background: #000;
      display: block !important;
    }
    #s803-embed-wrap iframe {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
    }
  </style>
</head>
<body>
  <div id="s803-embed-wrap">
    <iframe 
      src="https://sports803livestream.blogspot.com/search/label/Highlights" 
      allow="autoplay; fullscreen; picture-in-picture"
      loading="eager"
      title="Sports 803">
    </iframe>
  </div>
</body>
</html>
